<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4a90d9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MyPWA">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <title>My PWA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>My PWA</h1>
        </header>

        <main>
            <section class="counter-section">
                <p>You've visited this app <span id="visit-count">0</span> times</p>
                <button id="increment-btn">Increment</button>
                <button id="reset-btn">Reset</button>
            </section>

            <section class="notes-section">
                <h2>Quick Notes</h2>
                <textarea id="notes" placeholder="Type your notes here... They'll be saved automatically."></textarea>
            </section>

            <section class="status-section">
                <p id="online-status"></p>
                <p id="install-prompt" style="display: none;">
                    <button id="install-btn">Install App</button>
                </p>
            </section>
        </main>

        <footer>
            <p>Works offline!</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
